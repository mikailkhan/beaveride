services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: beaveride
      POSTGRES_USER: beaveride
      POSTGRES_PASSWORD: beaveride_dev_password
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beaveride -d beaveride"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://beaveride:beaveride_dev_password@postgres:5432/beaveride
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - ./server:/app
      - server-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
    environment:
      NODE_ENV: development
    ports:
      - 127.0.0.1:5173:5173
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    depends_on:
      - server

volumes:
  postgres-data:
  server-node-modules:
  client-node-modules:
